    <style>
      :root {
        --font-display: "Space Grotesk", system-ui, sans-serif;
        --font-body: "Geist", system-ui, sans-serif;
        --font-mono: "Space Mono", monospace;
      }
      body {
        font-family: var(--font-body);
      }
      .font-space-grotesk {
        font-family: "Space Grotesk", sans-serif !important;
      }
      .font-geist {
        font-family: "Geist", sans-serif !important;
      }
      .font-mono {
        font-family: "Space Mono", monospace;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Card sizing — larger for TV viewing */
      .slide-container {
        aspect-ratio: 3/4;
        min-width: 0;
        will-change: transform, opacity;
        contain: layout paint;
        backface-visibility: hidden;
      }

      /* Background grid */
      .bg-grid-pattern {
        background-image: radial-gradient(
          circle at 1px 1px,
          rgba(255, 255, 255, 0.1) 1px,
          transparent 0
        );
        background-size: 24px 24px;
      }

      /* ============= SITE SCROLL ANIMATION ============= */
      /* The student website screenshot scrolls slowly inside its card */
      .site-bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      /* Force desktop rendering of preview, then scale to fit card width.
         Scale = cardWidth / 1440 (iframe's intrinsic render width). */
      .site-bg-inner {
        --card-w: min(85vw, 460px);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: calc(var(--card-w) * 3500 / 1440);
        background-size: 100% auto;
        background-position: top center;
        background-repeat: no-repeat;
      }
      .site-bg-inner iframe {
        width: 1440px;
        height: 3500px;
        border: 0;
        transform-origin: top left;
        transform: scale(calc(var(--card-w) / 1440px));
        pointer-events: none;
      }
      @media (min-width: 768px) {
        .site-bg-inner {
          --card-w: 640px;
        }
      }

      /* Card content overlay gradient */
      .card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(10, 10, 10, 0.4) 0%,
          rgba(10, 10, 10, 0.1) 30%,
          rgba(10, 10, 10, 0.5) 60%,
          rgba(10, 10, 10, 0.95) 100%
        );
        pointer-events: none;
      }

      /* Animation intro */
      @keyframes animationIn {
        0% {
          opacity: 0;
          transform: translateY(30px);
          filter: blur(8px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0px);
        }
      }
      .animate-on-scroll {
        animation-play-state: paused !important;
      }
      .animate-on-scroll.animate {
        animation-play-state: running !important;
      }

      .progress-bar {
        transform-origin: left;
        transform: scaleX(0);
      }

      /* QR code styling */
      .qr-grid {
        display: grid;
        grid-template-columns: repeat(15, 1fr);
        width: 100%;
        aspect-ratio: 1;
        background: #000;
      }
      .qr-grid div {
        background: #000;
      }
      .qr-grid div.white {
        background: #fff;
      }

      /* ============= RESPONSIVE LAYOUT ============= */
      .slide-container {
        width: min(85vw, 460px);
        height: calc(100vh - 90px);
      }
      #slider {
        padding-inline: calc(50vw - min(42.5vw, 230px));
      }
      @media (min-width: 768px) {
        .slide-container {
          width: 640px;
          height: calc(100vh - 110px);
        }
        #slider {
          padding-inline: calc(50vw - 320px);
        }
      }
    </style>

      // ============= PREVIEW GENERATION =============
      function lightenColor(hex, percent) {
        const num = parseInt(hex.slice(1), 16);
        const r = Math.min(255, (num >> 16) + percent * 2.5);
        const g = Math.min(255, ((num >> 8) & 0xff) + percent * 2.5);
        const b = Math.min(255, (num & 0xff) + percent * 2.5);
        return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
      }
      function darkenColor(hex, percent) {
        const num = parseInt(hex.slice(1), 16);
        const r = Math.max(0, (num >> 16) - percent * 2.5);
        const g = Math.max(0, ((num >> 8) & 0xff) - percent * 2.5);
        const b = Math.max(0, (num & 0xff) - percent * 2.5);
        return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
      }

      // ============= FAKE QR CODE =============
      function generateQR(seed, container) {
        container.innerHTML = "";
        // seed may be a non-numeric UUID — hash it to a stable integer.
        let seedNum = 0;
        const str = String(seed || "");
        for (let i = 0; i < str.length; i++) {
          seedNum = (seedNum * 31 + str.charCodeAt(i)) | 0;
        }
        seedNum = Math.abs(seedNum);
        for (let i = 0; i < 225; i++) {
          const cell = document.createElement("div");
          const row = Math.floor(i / 15);
          const col = i % 15;
          const inCorner =
            (row < 3 && col < 3) ||
            (row < 3 && col > 11) ||
            (row > 11 && col < 3);
          const cornerBorder =
            (row === 0 || row === 2 || col === 0 || col === 2) &&
            row < 3 &&
            col < 3;
          const cornerBorderTR =
            (row === 0 || row === 2 || col === 12 || col === 14) &&
            row < 3 &&
            col > 11;
          const cornerBorderBL =
            (row === 12 || row === 14 || col === 0 || col === 2) &&
            row > 11 &&
            col < 3;
          const cornerCenter =
            (row === 1 && col === 1) ||
            (row === 1 && col === 13) ||
            (row === 13 && col === 1);
          if (
            cornerBorder ||
            cornerBorderTR ||
            cornerBorderBL ||
            cornerCenter
          ) {
            // black
          } else if (inCorner) {
            cell.classList.add("white");
          } else {
            const hash = Math.abs(((seedNum * 31 + i * 7) ^ (i * i)) % 100);
            if (hash > 48) cell.classList.add("white");
          }
          container.appendChild(cell);
        }
      }

      // ============= BUILD CAROUSEL =============
      // Only render a window of slides at a time for performance (10 around current)
      const VISIBLE_WINDOW = 10;
      const slider = document.getElementById("slider");
      let currentIndex = 0;

      function buildSlide(student, index) {
        const section = document.createElement("section");
        section.className =
          "slide-container flex-shrink-0 flex flex-col overflow-hidden group bg-[#0A0A0A] border-white/10 border relative shadow-2xl rounded-2xl origin-center will-change-transform";
        section.id = `slide-${index}`;
        section.dataset.index = index;

        section.innerHTML = `
        <!-- Site screenshot background (scrolling) — live example.html preview -->
        <div class="site-bg">
          <div class="site-bg-inner">
            <iframe
              src="example.html"
              loading="lazy"
              scrolling="no"
              tabindex="-1"
            ></iframe>
          </div>
        </div>

        <!-- Progress bar at top -->
        <div class="absolute top-0 left-0 right-0 h-0.5 bg-white/10 z-30">
          <div class="progress-bar h-full bg-orange-500" data-progress></div>
        </div>

        <!-- Top header overlay -->
        <header class="absolute top-0 left-0 right-0 z-20 flex items-start justify-between p-4 sm:p-8">
          <span class="font-mono text-[9px] sm:text-xs text-neutral-200 uppercase tracking-widest bg-black/45 backdrop-blur-md px-2.5 py-1 rounded-full border border-white/10" data-stagger>
            [<span data-counter>${student.slideNum}</span>/${student.totalSlides}] // ${student.stack.toUpperCase()}
          </span>
        </header>

        <!-- Bottom info panel -->
        <div class="absolute bottom-0 left-0 right-0 z-20 h-[32%] sm:h-1/4 px-4 sm:px-6 py-3 sm:py-4 flex gap-3 sm:gap-4 items-stretch overflow-hidden" data-info-panel
             style="background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,0.85) 18%, rgba(10,10,10,0.96) 50%, rgba(10,10,10,1) 100%);">

          <!-- Left: text content -->
          <div class="flex-1 min-w-0 flex flex-col justify-between">
            <div class="min-h-0">
              <!-- Project label -->
              <div class="mb-0.5 sm:mb-1" data-stagger>
                <span class="font-mono text-[9px] uppercase tracking-[0.3em] text-orange-500 font-bold">Now showing</span>
              </div>

              <!-- Student name -->
              <h1 class="font-space-grotesk text-2xl sm:text-3xl md:text-4xl tracking-tighter leading-[0.95] font-semibold text-white break-words" data-name
                  style="text-shadow: 0 1px 2px rgba(0,0,0,1), 0 4px 14px rgba(0,0,0,0.95), 0 10px 44px rgba(0,0,0,0.85), 0 0 32px rgba(249,115,22,0.45);">
                ${student.firstName} <span class="text-white/80">${student.lastName}</span>
              </h1>

              <!-- Project title -->
              <p class="font-space-grotesk text-sm sm:text-base md:text-lg text-white/85 mt-0.5 sm:mt-1 truncate" data-stagger>
                ${student.project}
              </p>
            </div>

            <!-- Meta row -->
            <div class="pt-1.5 sm:pt-2 border-t border-white/10 flex flex-col gap-1 sm:gap-1.5" data-stagger>
              <div class="flex gap-1.5 sm:gap-2 flex-wrap">
                <span class="text-[10px] sm:text-sm font-mono uppercase tracking-wider px-2 sm:px-3 py-0.5 sm:py-1.5 bg-orange-500 text-black rounded font-bold">Year ${student.year}</span>
                <span class="text-[10px] sm:text-sm font-mono uppercase tracking-wider px-2 sm:px-3 py-0.5 sm:py-1.5 bg-white/10 border border-white/15 rounded">${student.stack}</span>
              </div>
              <span class="font-mono text-[8px] sm:text-[9px] text-neutral-500 tracking-widest truncate">PROJECT #${student.slideNum} · CARD ${student.cardId || "—"}</span>
            </div>
          </div>

          <!-- Right: QR — compact chip on mobile, large block on desktop -->
          <div class="bg-white p-1 sm:p-2 rounded-md shrink-0 flex flex-col items-center justify-center self-center w-20 sm:w-auto h-20 sm:h-[70%] aspect-square shadow-[0_4px_18px_rgba(0,0,0,0.5)]" data-stagger>
            <div class="qr-grid" data-qr="${student.id}" style="height: 100%; width: auto;"></div>
            <div class="hidden sm:block text-black text-[10px] font-mono font-bold text-center mt-1 tracking-wider">SCAN</div>
          </div>
        </div>
      `;

        return section;
      }

      // Render all slides (300 is fine — they're lightweight when not scrolled into view)
      function renderAllSlides() {
        slider.innerHTML = "";
        students.forEach((student, idx) => {
          slider.appendChild(buildSlide(student, idx));
        });
        // Generate QR codes
        slider.querySelectorAll("[data-qr]").forEach((el) => {
          generateQR(el.dataset.qr, el);
        });
      }

      // ============= AUTO-ADVANCE =============
      const SLIDE_DURATION = 8000; // 8 seconds per student

      function advance() {
        currentIndex = (currentIndex + 1) % TOTAL_STUDENTS;
        goToSlide(currentIndex);
      }

      // Register GSAP plugins
      gsap.registerPlugin(SplitText, Flip);
      let prevActiveIdx = 0;

      function goToSlide(idx) {
        const target = document.getElementById(`slide-${idx}`);
        if (!target) return;
        // Tween scrollLeft in sync with scale/tilt animation — no native
        // scroll-snap, so the browser never jerks the card after the fact.
        const targetScrollLeft =
          target.offsetLeft + target.offsetWidth / 2 - slider.clientWidth / 2;
        const scrollObj = { x: slider.scrollLeft };
        gsap.to(scrollObj, {
          x: targetScrollLeft,
          duration: 1.0,
          ease: "power3.out",
          overwrite: "auto",
          onUpdate() {
            slider.scrollLeft = scrollObj.x;
          },
        });
        updateSlideScales(idx);
        animateActiveSlide(idx);
        prevActiveIdx = idx;
      }

      // ============= GSAP COVERFLOW (scale + 3D tilt) =============
      function updateSlideScales(activeIdx) {
        const propsByDistance = (signed) => {
          const d = Math.abs(signed);
          if (d === 0) return { scale: 1, opacity: 1, rotationY: 0, z: 0 };
          if (d === 1)
            return {
              scale: 0.72,
              opacity: 0.65,
              rotationY: signed < 0 ? 22 : -22,
              z: -120,
            };
          return {
            scale: 0.52,
            opacity: 0.25,
            rotationY: signed < 0 ? 30 : -30,
            z: -240,
          };
        };
        const range = 2;
        // Hide every slide outside the visible window so the browser
        // doesn't waste cycles compositing 300 transformed cards/iframes.
        for (let i = 0; i < TOTAL_STUDENTS; i++) {
          const el = document.getElementById(`slide-${i}`);
          if (!el) continue;
          const dist = Math.abs(i - activeIdx);
          if (dist > range) {
            el.style.visibility = "hidden";
            el.style.opacity = "0";
            continue;
          }
          el.style.visibility = "visible";
          gsap.to(el, {
            ...propsByDistance(i - activeIdx),
            duration: 0.9,
            ease: "power3.out",
            overwrite: "auto",
            force3D: true,
          });
        }
      }

      // ============= ACTIVE-SLIDE ANIMATIONS =============
      // Stagger entrance, SplitText name, counter ticker, progress bar,
      // bg parallax, and Flip-driven info panel reveal.
      const splitTextCache = new WeakMap();
      function animateActiveSlide(idx) {
        const slide = document.getElementById(`slide-${idx}`);
        if (!slide) return;

        // --- Stagger entrance of [data-stagger] items ---
        const items = slide.querySelectorAll("[data-stagger]");
        gsap.fromTo(
          items,
          { y: 24, opacity: 0 },
          {
            y: 0,
            opacity: 1,
            duration: 0.7,
            ease: "expo.out",
            stagger: 0.06,
            overwrite: "auto",
            force3D: true,
          },
        );

        // --- SplitText reveal on student name ---
        const nameEl = slide.querySelector("[data-name]");
        if (nameEl) {
          const cached = splitTextCache.get(nameEl);
          if (cached) cached.revert();
          const split = new SplitText(nameEl, { type: "chars" });
          splitTextCache.set(nameEl, split);
          gsap.from(split.chars, {
            yPercent: 110,
            opacity: 0,
            rotateX: -90,
            duration: 0.8,
            ease: "expo.out",
            stagger: 0.025,
            delay: 0.15,
          });
        }

        // --- Number ticker for [04/300] counter ---
        const counter = slide.querySelector("[data-counter]");
        if (counter) {
          const targetVal = idx + 1;
          const fromVal = prevActiveIdx + 1;
          const obj = { v: fromVal };
          gsap.to(obj, {
            v: targetVal,
            duration: 0.7,
            ease: "power2.out",
            onUpdate() {
              counter.textContent = String(Math.round(obj.v)).padStart(2, "0");
            },
          });
        }

        // --- Progress bar via GSAP (replaces CSS keyframe) ---
        const bar = slide.querySelector("[data-progress]");
        if (bar) {
          gsap.killTweensOf(bar);
          gsap.fromTo(
            bar,
            { scaleX: 0 },
            {
              scaleX: 1,
              duration: SLIDE_DURATION / 1000,
              ease: "none",
            },
          );
        }

        // --- Background screenshot parallax (transform only, no scale
        //     so the iframe doesn't trigger costly relayout each frame) ---
        const bg = slide.querySelector(".site-bg-inner");
        if (bg) {
          gsap.killTweensOf(bg);
          const slideH = slide.offsetHeight || 1;
          const travel = Math.max(0, bg.offsetHeight - slideH);
          gsap.fromTo(
            bg,
            { y: 0 },
            {
              y: -travel,
              duration: (SLIDE_DURATION / 1000) * 0.95,
              ease: "none",
              force3D: true,
            },
          );
        }

        // --- Info panel reveal ---
        const panel = slide.querySelector("[data-info-panel]");
        if (panel) {
          gsap.fromTo(
            panel,
            { y: 30, opacity: 0.3 },
            {
              y: 0,
              opacity: 1,
              duration: 0.9,
              ease: "power3.out",
              overwrite: "auto",
            },
          );
        }
      }

      // ============= AUTO-ADVANCE CONTROL =============
      let autoAdvanceTimer = null;
      function startAutoAdvance() {
        stopAutoAdvance();
        autoAdvanceTimer = setInterval(advance, SLIDE_DURATION);
      }
      function stopAutoAdvance() {
        if (autoAdvanceTimer) clearInterval(autoAdvanceTimer);
        autoAdvanceTimer = null;
      }
      let resumeTimeout = null;
      function pauseAutoAdvance(ms) {
        stopAutoAdvance();
        if (resumeTimeout) clearTimeout(resumeTimeout);
        resumeTimeout = setTimeout(startAutoAdvance, ms);
      }

      // ============= TOAST =============
      const toastEl = document.getElementById("toast");
      const toastTextEl = document.getElementById("toast-text");
      let toastTimer = null;
      function showToast(text, variant) {
        toastTextEl.textContent = text;
        toastEl.style.borderColor =
          variant === "error" ? "rgba(239,68,68,0.6)" : "rgba(249,115,22,0.5)";
        toastEl.style.color = variant === "error" ? "#fca5a5" : "#fff";
        gsap.killTweensOf(toastEl);
        gsap.fromTo(
          toastEl,
          { y: -10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.35, ease: "power3.out" },
        );
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          gsap.to(toastEl, {
            y: -10,
            opacity: 0,
            duration: 0.35,
            ease: "power3.in",
          });
        }, 3500);
      }

      // ============= SCAN / SEARCH =============
      const SCAN_PAUSE_MS = 30000;
      const scanDot = document.getElementById("scan-dot");
      function flashScanDot(color) {
        scanDot.style.background = color;
        scanDot.style.boxShadow = `0 0 8px ${color}`;
        setTimeout(() => {
          scanDot.style.background = "#525252";
          scanDot.style.boxShadow = "none";
        }, 1500);
      }

      // Look up by cardId (exact), then studentId (exact, case-insensitive),
      // then by name (case-insensitive contains). Returns index or -1.
      function findStudent(query) {
        const q = String(query || "").trim();
        if (!q) return -1;
        if (cardIdToIndex.has(q)) return cardIdToIndex.get(q);
        const lower = q.toLowerCase();
        if (studentIdToIndex.has(lower)) return studentIdToIndex.get(lower);
        return students.findIndex(
          (s) => s.name && s.name.toLowerCase().includes(lower),
        );
      }

      function handleScan(rawValue) {
        const value = String(rawValue || "").trim();
        if (!value) return;
        const idx = findStudent(value);
        if (idx === -1) {
          showToast(`Card not recognized · ${value}`, "error");
          flashScanDot("#ef4444");
          return;
        }
        const s = students[idx];
        currentIndex = idx;
        goToSlide(idx);
        pauseAutoAdvance(SCAN_PAUSE_MS);
        showToast(`Scanned · ${s.name}`, "ok");
        flashScanDot("#f97316");
        // Highlight pulse on the active card
        const slideEl = document.getElementById(`slide-${idx}`);
        if (slideEl) {
          gsap.fromTo(
            slideEl,
            { scale: 1 },
            {
              scale: 1.04,
              duration: 0.2,
              ease: "power2.out",
              yoyo: true,
              repeat: 1,
              overwrite: false,
            },
          );
        }
      }

      function wireScanInputs() {
        const search = document.getElementById("search-input");

        // Keep the visible search input focused so scanner keystrokes land here
        // and the scanned value is visible to the user.
        const refocus = () => {
          if (document.activeElement !== search) search.focus();
        };
        refocus();
        document.addEventListener("click", refocus);
        search.addEventListener("blur", () => setTimeout(refocus, 0));

        // Detect rapid keystroke bursts (typical of RFID/barcode scanners) so
        // a scan auto-submits without waiting for Enter.
        let lastKeyTime = 0;
        let burstChars = 0;
        const SCAN_BURST_GAP_MS = 50;
        const SCAN_BURST_MIN = 4;
        let autoSubmitTimer = null;

        search.addEventListener("keydown", (e) => {
          const now = performance.now();
          if (e.key === "Enter") {
            e.preventDefault();
            clearTimeout(autoSubmitTimer);
            const v = search.value;
            handleScan(v);
            search.value = "";
            burstChars = 0;
            return;
          }
          if (e.key.length === 1) {
            if (now - lastKeyTime < SCAN_BURST_GAP_MS) burstChars++;
            else burstChars = 1;
            lastKeyTime = now;

            // If we've seen a fast burst, schedule an auto-submit shortly after
            // the last keystroke (covers scanners that don't append Enter).
            clearTimeout(autoSubmitTimer);
            if (burstChars >= SCAN_BURST_MIN) {
              autoSubmitTimer = setTimeout(() => {
                const v = search.value;
                if (!v) return;
                handleScan(v);
                search.value = "";
                burstChars = 0;
              }, 120);
            }
          }
        });

        // Live search as the user types (manual lookup), debounced.
        let liveTimer = null;
        search.addEventListener("input", () => {
          clearTimeout(liveTimer);
          const v = search.value.trim();
          if (!v) return;
          liveTimer = setTimeout(() => {
            // Skip if an auto-submit burst is pending.
            if (autoSubmitTimer) return;
            const idx = findStudent(v);
            if (idx !== -1) {
              currentIndex = idx;
              goToSlide(idx);
              pauseAutoAdvance(SCAN_PAUSE_MS);
            }
          }, 250);
        });
      }

      // ============= INIT =============
      (async function init() {
        await loadStudents();
        if (TOTAL_STUDENTS === 0) return;
        renderAllSlides();
        gsap.set("[id^='slide-']", {
          scale: 0.4,
          opacity: 0,
          rotationY: 0,
          transformPerspective: 2000,
        });
        updateSlideScales(0);
        animateActiveSlide(0);
        startAutoAdvance();
        wireScanInputs();
      })();

      // Arrow key navigation
      document.addEventListener("keydown", (e) => {
        if (!TOTAL_STUDENTS) return;
        // Don't hijack arrows when the user is typing in the search box
        if (document.activeElement?.id === "search-input") return;
        if (e.key === "ArrowRight") {
          currentIndex = (currentIndex + 1) % TOTAL_STUDENTS;
          goToSlide(currentIndex);
        } else if (e.key === "ArrowLeft") {
          currentIndex = (currentIndex - 1 + TOTAL_STUDENTS) % TOTAL_STUDENTS;
          goToSlide(currentIndex);
        }
      });

      // Touch swipe navigation (mobile)
      let touchStartX = 0;
      let touchStartY = 0;
      slider.addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        },
        { passive: true },
      );
      slider.addEventListener(
        "touchend",
        (e) => {
          if (!TOTAL_STUDENTS) return;
          const dx = e.changedTouches[0].clientX - touchStartX;
          const dy = e.changedTouches[0].clientY - touchStartY;
          if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
          if (dx < 0) {
            currentIndex = (currentIndex + 1) % TOTAL_STUDENTS;
          } else {
            currentIndex = (currentIndex - 1 + TOTAL_STUDENTS) % TOTAL_STUDENTS;
          }
          goToSlide(currentIndex);
          pauseAutoAdvance(SCAN_PAUSE_MS);
        },
        { passive: true },
      );
    </script>
  </body>
</html>
